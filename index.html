<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Reshu ❤️</title>
<style>
body{
margin:0;
padding:0;
background:linear-gradient(to right,#ff9a9e,#fad0c4);
text-align:center;
font-family:Arial;
color:white;
overflow:hidden;
}
h1{
margin-top:50px;
font-size:40px;
animation: glow 2s infinite alternate;
}
@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 30px red;}
}
#countdown{
font-size:30px;
margin-top:20px;
}
button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
cursor:pointer;
margin-top:20px;
}
button:hover{
background:#ff4d6d;
color:white;
}
#slideshow{
width:250px;
height:300px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 20px white;
}
#surprise{
display:none;
font-size:25px;
margin-top:20px;
animation: fade 2s;
}
@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>
<body>

<h1>Happy Birthday Reshu ❤️</h1>

<div id="countdown"></div>

<img id="slideshow" src="photo1.jpg">

<br>

<button onclick="showSurprise()">Click for Surprise 🎁</button>

<div id="surprise">
You are the most beautiful part of my life 💖<br>
I love you forever Reshu ❤️
</div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// Countdown Timer
var birthday = new Date("March 3, 2026 00:00:00").getTime();
setInterval(function(){
var now = new Date().getTime();
var distance = birthday - now;
var days = Math.floor(distance/(1000*60*60*24));
var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance%(1000*60*60))/(1000*60));
var seconds = Math.floor((distance%(1000*60))/1000);
document.getElementById("countdown").innerHTML = days+"d "+hours+"h "+minutes+"m "+seconds+"s ";
if(distance<0){
document.getElementById("countdown").innerHTML = "Happy Birthday My Love ❤️";
}
},1000);

// Surprise button
function showSurprise(){
document.getElementById("surprise").style.display="block";
}

// Slideshow
var photos = ["photo1.jpg","photo2.jpg","photo3.jpg"];
var index = 0;
setInterval(function(){
index++;
if(index >= photos.length) index=0;
document.getElementById("slideshow").src = photos[index];
},3000);

// Music auto play on click (mobile friendly)
var music = document.getElementById("bgMusic");
document.body.addEventListener("click", function(){
music.play();
});
</script>

</body>
</html>
